{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}

    <div class="login-container">
        <h2>ログイン画面</h2>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                {{ form.username }}
            </div>

            <div class="form-group">
                {{ form.password }}
            </div>

            <button type="submit" class="login-button">ログイン</button>
        </form>
    </div>

    {% if form.errors %}
        <p style="color:red;">ユーザー名またはパスワードが違います</p>
    {% endif %}

{% endblock %}
