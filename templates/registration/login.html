{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">ログイン</button>
    </form>

    {% if form.errors %}
        <p style="color:red;">ユーザー名またはパスワードが違います</p>
    {% endif %}

{% endblock %}
